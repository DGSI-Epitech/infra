name: Mirror Repository

on:
  push:
    branches:
      - main
      - mirror-job

jobs:
  mirror:
    name: Mirror to Epitech Repo
    runs-on: ubuntu-latest
    if: github.repository == 'DGSI-Epitech/infra'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror to Epitech repository
        uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url: git@github.com:EpitechMscProPromo2027/T-NSA-810-PAR_15.git
          ssh_private_key: ${{ secrets.MIRROR_SSH_KEY }}