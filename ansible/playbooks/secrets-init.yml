---
- name: Initialize NetBox secrets in Vault
  hosts: ops
  become: true
  tasks:
    - name: Slurp vault-init.json
      slurp:
        src: /root/vault-init.json
      register: vault_init_raw
      no_log: true

    - name: Set vault root token
      set_fact:
        vault_root_token: "{{ (vault_init_raw.content | b64decode | from_json).root_token }}"
      no_log: true

    - name: Check if NetBox secrets already in Vault
      uri:
        url: "https://127.0.0.1:8200/v1/secret/data/netbox"
        method: GET
        headers:
          X-Vault-Token: "{{ vault_root_token }}"
        ca_path: /etc/ssl/internal/ca.crt
        status_code: [200, 404]
      register: vault_netbox_check
      no_log: true

    - name: Generate secret_key
      shell: openssl rand -base64 50 | tr -d '\n'
      register: gen_secret_key
      no_log: true
      when: vault_netbox_check.status == 404

    - name: Generate password
      shell: openssl rand -base64 16 | tr -d '\n'
      register: gen_password
      no_log: true
      when: vault_netbox_check.status == 404

    - name: Generate api_token
      shell: openssl rand -hex 20
      register: gen_api_token
      no_log: true
      when: vault_netbox_check.status == 404

    - name: Store NetBox secrets in Vault
      uri:
        url: "https://127.0.0.1:8200/v1/secret/data/netbox"
        method: POST
        headers:
          X-Vault-Token: "{{ vault_root_token }}"
        body_format: json
        body:
          data:
            secret_key: "{{ gen_secret_key.stdout }}"
            password: "{{ gen_password.stdout }}"
            api_token: "{{ gen_api_token.stdout }}"
        ca_path: /etc/ssl/internal/ca.crt
        status_code: 200
      no_log: true
      when: vault_netbox_check.status == 404
