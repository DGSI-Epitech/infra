---
- name: Configure pfSense OP (Site Local)
  hosts: Pfsense_OP
  gather_facts: false
  collections:
    - pfsensible.core
  vars_files:
    - ../vars/openvpn_secrets.yml

  tasks:
    - name: Autoriser tout le trafic LAN vers WAN
      pfsensible.core.pfsense_rule:
        name: "Allow LAN to WAN"
        action: pass
        interface: lan
        protocol: any
        source: any
        destination: any
        state: present

    - name: Autoriser SSH entrant sur WAN
      pfsensible.core.pfsense_rule:
        name: "Allow SSH WAN"
        action: pass
        interface: wan
        protocol: tcp
        source: any
        destination: any
        destination_port: "22"
        state: present

    - name: Autoriser HTTPS entrant sur WAN (webGUI)
      pfsensible.core.pfsense_rule:
        name: "Allow HTTPS WAN"
        action: pass
        interface: wan
        protocol: tcp
        source: any
        destination: any
        destination_port: "443"
        state: present

    - name: Autoriser port OpenVPN sortant sur WAN
      pfsensible.core.pfsense_rule:
        name: "Allow OpenVPN 1194"
        action: pass
        interface: wan
        protocol: udp
        source: any
        destination: any
        destination_port: "1194"
        state: present

    - name: Configurer client OpenVPN (connexion vers Cloud)
      pfsensible.core.pfsense_openvpn_client:
        name: "VPN_vers_Cloud"
        mode: p2p_shared_key
        protocol: UDP4
        server_addr: "5.196.50.52"
        server_port: "1194"
        tunnel_network: "10.3.3.0/30"
        remote_network:
          - "192.168.255.240/28"
        shared_key: "{{ openvpn_shared_key }}"
        data_ciphers: []
        state: present

    - name: Autoriser trafic inter-sites sur interface OpenVPN (OP)
      pfsensible.core.pfsense_rule:
        name: "Allow OpenVPN inter-sites"
        action: pass
        interface: openvpn
        protocol: any
        source: any
        destination: any
        state: present

    - name: Configurer les serveurs DNS cibles (Forwarders)
      pfsensible.core.pfsense_setup:
        dns_addresses: "{{ item }}"
      with_items:
        - "1.1.1.1"
        - "8.8.8.8"

    - name: Créer l'Autorité de Certification (CAPfsense)
      pfsensible.core.pfsense_ca:
        name: "CA Interne pour Vault TLS"
        method: "internal"
        keytype: "RSA"
        keylen: 4096
        digest_alg: "sha256"
        lifetime: 3650
        dn_country: "FR"
        dn_state: "Ile-de-France"
        dn_city: "Paris"
        dn_organization: "Projet Cloud"
        dn_commonname: "CAPfsense"
        state: present
      register: ca_result

    - name: Sauvegarder le certificat public CA en local
      ansible.builtin.copy:
        content: "{{ ca_result.ca.crt }}"
        dest: "./CAPfsense.crt"
      delegate_to: localhost
      when: ca_result.ca is defined

- name: Configure pfSense Cloud
  hosts: Pfsense_Cloud
  gather_facts: false
  collections:
    - pfsensible.core
  vars_files:
    - ../vars/openvpn_secrets.yml

  tasks:
    - name: Autoriser tout le trafic DMZ vers ANY
      pfsensible.core.pfsense_rule:
        name: "Allow DMZ to ANY"
        action: pass
        interface: opt1
        protocol: any
        source: any
        destination: any
        state: present

    - name: Autoriser tout le trafic LAN vers ANY
      pfsensible.core.pfsense_rule:
        name: "Allow LAN to ANY"
        action: pass
        interface: lan
        protocol: any
        source: any
        destination: any
        state: present

    - name: Autoriser SSH entrant sur WAN
      pfsensible.core.pfsense_rule:
        name: "Allow SSH WAN"
        action: pass
        interface: wan
        protocol: tcp
        source: any
        destination: any
        destination_port: "22"
        state: present

    - name: Autoriser HTTPS entrant sur WAN (webGUI)
      pfsensible.core.pfsense_rule:
        name: "Allow HTTPS WAN"
        action: pass
        interface: wan
        protocol: tcp
        source: any
        destination: any
        destination_port: "443"
        state: present

    - name: Autoriser port OpenVPN entrant (1194 UDP)
      pfsensible.core.pfsense_rule:
        name: "Allow OpenVPN 1194"
        action: pass
        interface: wan
        protocol: udp
        source: any
        destination: any
        destination_port: "1194"
        state: present

    - name: Configurer serveur OpenVPN (site-to-site vers OP)
      pfsensible.core.pfsense_openvpn_server:
        name: "VPN_vers_OP"
        mode: p2p_shared_key
        protocol: UDP4
        interface: wan
        local_port: "1194"
        tunnel_network: "10.3.3.0/30"
        remote_network:
          - "172.16.255.240/28"
        shared_key: "{{ openvpn_shared_key }}"
        data_ciphers: []
        state: present

    - name: Autoriser trafic inter-sites sur interface OpenVPN (Cloud)
      pfsensible.core.pfsense_rule:
        name: "Allow OpenVPN inter-sites"
        action: pass
        interface: openvpn
        protocol: any
        source: any
        destination: any
        state: present

    - name: Configurer les DNS cibles
      pfsensible.core.pfsense_setup:
        dns_addresses: "{{ item }}"
      with_items:
        - "172.16.255.254"
        - "8.8.8.8"