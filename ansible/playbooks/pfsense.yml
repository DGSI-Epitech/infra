---
# Configuration complète des deux pfSenses.
#
# Usage :
#   ansible-playbook pfsense.yml                    # configuration complète
#   ansible-playbook pfsense.yml --tags killswitch  # couper le VPN (urgence)
#   ansible-playbook pfsense.yml --tags restore     # rétablir le VPN

- name: Configure pfSense OP (Site Local)
  hosts: Pfsense_OP
  gather_facts: false
  collections:
    - pfsensible.core
  vars_files:
    - ../vars/common.yml
    - ../vars/openvpn_secrets.yml
  vars:
    openvpn_client:
      name: "VPN_vers_Cloud"
      mode: p2p_shared_key
      protocol: UDP4
      # Ancien: server_addr: "5.196.50.52"  ← IP hardcodée, utilise PFSENSE_CLOUD_WAN
      server_addr: "{{ pfsense_cloud_wan }}"
      # Ancien: server_port: "1194"  ← port hardcodé, utilise VPN_PORT
      server_port: "{{ vpn_port }}"
      # Ancien: tunnel_network: "10.3.3.0/30"  ← réseau hardcodé, utilise VPN_TUNNEL_NETWORK
      tunnel_network: "{{ vpn_tunnel_network }}"
      # Ancien: remote_network: "192.168.255.240/28,10.255.255.248/29"  ← IPs hardcodées
      remote_network: "{{ vm_cloud_lan_subnet }},{{ vm_cloud_dmz_subnet }}"
      data_ciphers: []
      compression: ""

  tasks:
    - name: Configurer la clé SSH autorisée pour admin
      pfsensible.core.pfsense_user:
        name: admin
        authorizedkeys: "{{ ssh_public_key }}"
        state: present
      tags: [configure, ssh]

    - name: Autoriser tout le trafic LAN vers WAN
      pfsensible.core.pfsense_rule:
        name: "Allow LAN to WAN"
        action: pass
        interface: lan
        protocol: any
        source: any
        destination: any
        state: present
      tags: [configure, firewall]

    - name: Autoriser SSH entrant sur WAN
      pfsensible.core.pfsense_rule:
        name: "Allow SSH WAN"
        action: pass
        interface: wan
        protocol: tcp
        source: any
        destination: any
        destination_port: "22"
        state: present
      tags: [configure, firewall]

    - name: Autoriser HTTPS entrant sur WAN (webGUI)
      pfsensible.core.pfsense_rule:
        name: "Allow HTTPS WAN"
        action: pass
        interface: wan
        protocol: tcp
        source: any
        destination: any
        destination_port: "443"
        state: present
      tags: [configure, firewall]

    - name: Autoriser port OpenVPN sur WAN
      pfsensible.core.pfsense_rule:
        name: "Allow OpenVPN 1194"
        action: pass
        interface: wan
        protocol: udp
        source: any
        destination: any
        destination_port: "1194"
        state: present
      tags: [configure, firewall, vpn]

    - name: Configurer client OpenVPN (connexion vers Cloud)
      pfsensible.core.pfsense_openvpn_client:
        name: "{{ openvpn_client.name }}"
        mode: "{{ openvpn_client.mode }}"
        protocol: "{{ openvpn_client.protocol }}"
        server_addr: "{{ openvpn_client.server_addr }}"
        server_port: "{{ openvpn_client.server_port }}"
        tunnel_network: "{{ openvpn_client.tunnel_network }}"
        remote_network: "{{ openvpn_client.remote_network }}"
        shared_key: "{{ openvpn_shared_key }}"
        data_ciphers: "{{ openvpn_client.data_ciphers }}"
        compression: "{{ openvpn_client.compression }}"
        state: present
      tags: [configure, vpn]

    - name: Autoriser trafic inter-sites sur interface OpenVPN
      pfsensible.core.pfsense_rule:
        name: "Allow OpenVPN inter-sites"
        action: pass
        interface: openvpn
        protocol: any
        source: any
        destination: any
        state: present
      tags: [configure, firewall, vpn]

    - name: Configurer les serveurs DNS (Forwarders)
      pfsensible.core.pfsense_setup:
        dns_addresses: "{{ item }}"
      with_items:
        # Ancien: "192.168.255.254"  ← IP hardcodée, utilise PFSENSE_CLOUD_LAN_IP
        - "{{ pfsense_cloud_lan_ip }}"
        - "1.1.1.1"
        - "8.8.8.8"
      tags: [configure, dns]

    - name: Créer l'Autorité de Certification (CAPfsense)
      pfsensible.core.pfsense_ca:
        name: "CA Interne pour Vault TLS"
        method: "internal"
        keytype: "RSA"
        keylen: 4096
        digest_alg: "sha256"
        lifetime: 3650
        dn_country: "FR"
        dn_state: "Ile-de-France"
        dn_city: "Paris"
        dn_organization: "Projet Cloud"
        dn_commonname: "CAPfsense"
        state: present
      register: ca_result
      tags: [configure, ca]

    - name: Sauvegarder le certificat public CA en local
      ansible.builtin.copy:
        content: "{{ ca_result.ca.crt }}"
        dest: "./CAPfsense.crt"
      delegate_to: localhost
      when: ca_result.ca is defined
      tags: [configure, ca]

    - name: "[KILLSWITCH] Bloquer OpenVPN 1194 sur WAN"
      pfsensible.core.pfsense_rule:
        name: "KILLSWITCH_OpenVPN_1194"
        action: block
        interface: wan
        protocol: udp
        source: any
        destination: "{{ openvpn_client.server_addr }}"
        destination_port: "1194"
        state: present
      tags: [never, killswitch]

    - name: "[KILLSWITCH] Tuer le processus OpenVPN client"
      ansible.builtin.raw: kill $(cat /var/run/openvpn_client1.pid 2>/dev/null) 2>/dev/null || pkill -f 'openvpn.*client1' 2>/dev/null; true
      tags: [never, killswitch]

    - name: "[RESTORE] Supprimer la règle KILLSWITCH"
      pfsensible.core.pfsense_rule:
        name: "KILLSWITCH_OpenVPN_1194"
        interface: wan
        state: absent
      tags: [never, restore]

    - name: "[RESTORE] Supprimer le client OpenVPN (forcer recréation)"
      pfsensible.core.pfsense_openvpn_client:
        name: "{{ openvpn_client.name }}"
        mode: "{{ openvpn_client.mode }}"
        server_addr: "{{ openvpn_client.server_addr }}"
        server_port: "{{ openvpn_client.server_port }}"
        tunnel_network: "{{ openvpn_client.tunnel_network }}"
        remote_network: "{{ openvpn_client.remote_network }}"
        shared_key: "{{ openvpn_shared_key }}"
        data_ciphers: "{{ openvpn_client.data_ciphers }}"
        compression: "{{ openvpn_client.compression }}"
        state: absent
      tags: [never, restore]

    - name: "[RESTORE] Recréer le client OpenVPN"
      pfsensible.core.pfsense_openvpn_client:
        name: "{{ openvpn_client.name }}"
        mode: "{{ openvpn_client.mode }}"
        protocol: "{{ openvpn_client.protocol }}"
        server_addr: "{{ openvpn_client.server_addr }}"
        server_port: "{{ openvpn_client.server_port }}"
        tunnel_network: "{{ openvpn_client.tunnel_network }}"
        remote_network: "{{ openvpn_client.remote_network }}"
        shared_key: "{{ openvpn_shared_key }}"
        data_ciphers: "{{ openvpn_client.data_ciphers }}"
        compression: "{{ openvpn_client.compression }}"
        disable: false
        state: present
      tags: [never, restore]


# pfSense Cloud est configuré dans playbooks/pfsense-cloud.yml (rôle pfsense-cloud)
