- name: Configure pfSense
  hosts: pfsense
  gather_facts: false
  collections:
    - pfsensible.core

  tasks:
    # Règle LAN → WAN
    - name: Autoriser tout le trafic LAN vers WAN
      pfsensible.core.pfsense_rule:
        name: "Allow LAN to WAN"
        action: pass
        interface: lan
        protocol: any
        source: lan
        destination: any
        state: present
      become: true

    # Règle SSH depuis OVH
    - name: Autoriser SSH depuis OVH
      pfsensible.core.pfsense_rule:
        name: "Allow SSH from OVH"
        action: pass
        interface: wan
        protocol: tcp
        source: "51.75.128.134"
        destination: "172.16.0.254"
        destination_port: "22"
        state: present
      become: true

    # DNS
    - name: Configurer DNS
      pfsensible.core.pfsense_setup:
        dnsserver:
          - "1.1.1.1"
          - "8.8.8.8"
      become: true

    - name: Créer l'Autorité de Certification (CAPfsense)
          pfsensible.core.pfsense_ca:
            name: "CAPfsense"
            descr: "CA Interne pour Vault TLS"
            method: "internal"
            keytype: "RSA"
            keylen: 4096
            digest: "sha256"
            lifetime: 3650
            dn_country: "FR"
            dn_state: "Ile-de-France"
            dn_city: "Paris"
            dn_organization: "Projet Cloud"
            dn_commonname: "CAPfsense"
            state: present
          become: true
          register: ca_result

        - name: Sauvegarder le certificat public CA en local
          ansible.builtin.copy:
            content: "{{ ca_result.ca.crt }}"
            dest: "./CAPfsense.crt"
          delegate_to: localhost
          become: false
          when: ca_result.ca is defined