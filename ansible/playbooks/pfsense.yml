---
- name: Configure pfSense OP (Site Local)
  hosts: Pfsense-OP
  gather_facts: false
  collections:
    - pfsensible.core

  tasks:
    - name: Autoriser tout le trafic LAN vers WAN
      pfsensible.core.pfsense_rule:
        name: "Allow LAN to WAN"
        action: pass
        interface: lan
        protocol: any
        source: any
        destination: any
        state: present

    - name: Autoriser SSH entrant sur WAN
      pfsensible.core.pfsense_rule:
        name: "Allow SSH WAN"
        action: pass
        interface: wan
        protocol: tcp
        source: any
        destination: any
        destination_port: "22"
        state: present

    - name: Configurer les serveurs DNS cibles (Forwarders)
      pfsensible.core.pfsense_setup:
        dns_addresses: "{{ item }}"
      with_items:
        - "1.1.1.1"
        - "8.8.8.8"

    - name: Créer l'Autorité de Certification (CAPfsense)
      pfsensible.core.pfsense_ca:
        name: "CA Interne pour Vault TLS"
        method: "internal"
        keytype: "RSA"
        keylen: 4096
        digest_alg: "sha256"
        lifetime: 3650
        dn_country: "FR"
        dn_state: "Ile-de-France"
        dn_city: "Paris"
        dn_organization: "Projet Cloud"
        dn_commonname: "CAPfsense"
        state: present
      register: ca_result

    - name: Sauvegarder le certificat public CA en local
      ansible.builtin.copy:
        content: "{{ ca_result.ca.crt }}"
        dest: "./CAPfsense.crt"
      delegate_to: localhost
      when: ca_result.ca is defined

- name: Configure pfSense Cloud
  hosts: Pfsense-Cloud
  gather_facts: false
  collections:
    - pfsensible.core

  tasks:
    - name: Bloquer DMZ vers LAN interne
      pfsensible.core.pfsense_rule:
        name: "Block DMZ to LAN"
        action: block
        interface: opt1
        protocol: any
        source: any
        destination: "192.168.255.240/28"
        state: present

    - name: Autoriser Teleport (DMZ) vers noeuds LAN port 3022
      pfsensible.core.pfsense_rule:
        name: "Allow Teleport DMZ to LAN nodes"
        action: pass
        interface: opt1
        protocol: tcp
        source: any
        destination: "192.168.255.240/28"
        destination_port: "3022"
        state: present

    - name: Autoriser trafic DMZ vers internet
      pfsensible.core.pfsense_rule:
        name: "Allow DMZ to Internet"
        action: pass
        interface: opt1
        protocol: any
        source: any
        destination: any
        state: present

    - name: Autoriser tout le trafic LAN vers ANY
      pfsensible.core.pfsense_rule:
        name: "Allow LAN to ANY"
        action: pass
        interface: lan
        protocol: any
        source: any
        destination: any
        state: present

    - name: Autoriser SSH entrant sur WAN
      pfsensible.core.pfsense_rule:
        name: "Allow SSH WAN"
        action: pass
        interface: wan
        protocol: tcp
        source: any
        destination: any
        destination_port: "22"
        state: present

    - name: Autoriser port OpenVPN entrant (1194 UDP)
      pfsensible.core.pfsense_rule:
        name: "Allow OpenVPN 1194"
        action: pass
        interface: wan
        protocol: udp
        source: any
        destination: any
        destination_port: "1194"
        state: present

    - name: Configurer les DNS cibles
      pfsensible.core.pfsense_setup:
        dns_addresses: "{{ item }}"
      with_items:
        - "172.16.255.254"
        - "8.8.8.8"