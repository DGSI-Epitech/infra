---
# Emergency cut-off — bloque le port 1194 UDP sur WAN des deux pfSenses.
# Le tunnel tombe immédiatement, le SSH reste accessible pour récupération.
# Restauration : ansible-playbook playbooks/pfsense-restore-vpn.yml

- name: Kill VPN — pfSense Cloud (serveur)
  hosts: Pfsense_Cloud
  gather_facts: false
  collections:
    - pfsensible.core

  tasks:
    - name: Bloquer OpenVPN 1194 entrant sur WAN
      pfsensible.core.pfsense_rule:
        name: "KILLSWITCH_OpenVPN_1194"
        action: block
        interface: wan
        protocol: udp
        source: any
        destination: any
        destination_port: "1194"
        state: present

    - name: Tuer le processus OpenVPN serveur (couper session active)
      ansible.builtin.raw: kill $(cat /var/run/openvpn_server1.pid 2>/dev/null) 2>/dev/null || pkill -f 'openvpn.*server1' 2>/dev/null; true

- name: Kill VPN — pfSense OP (client)
  hosts: Pfsense_OP
  gather_facts: false
  collections:
    - pfsensible.core

  tasks:
    - name: Bloquer OpenVPN 1194 sortant vers Cloud sur WAN
      pfsensible.core.pfsense_rule:
        name: "KILLSWITCH_OpenVPN_1194"
        action: block
        interface: wan
        protocol: udp
        source: any
        destination: "5.196.50.52"
        destination_port: "1194"
        state: present

    - name: Tuer le processus OpenVPN client (couper session active)
      ansible.builtin.raw: kill $(cat /var/run/openvpn_client1.pid 2>/dev/null) 2>/dev/null || pkill -f 'openvpn.*client1' 2>/dev/null; true
