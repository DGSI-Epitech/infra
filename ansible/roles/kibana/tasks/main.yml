---
- name: Create Kibana directory
  file:
    path: "{{ kibana_dir }}/config"
    state: directory
    mode: "0755"

- name: Deploy Kibana config
  template:
    src: kibana.yml.j2
    dest: "{{ kibana_dir }}/config/kibana.yml"
    mode: "0644"

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ kibana_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start Kibana
  command: docker compose up -d kibana
  args:
    chdir: "{{ kibana_dir }}"
  changed_when: false

- name: Allow Kibana port
  community.general.ufw:
    rule: allow
    port: "{{ kibana_port | string }}"
    proto: tcp

- name: Wait for Kibana to be ready
  uri:
    url: "https://127.0.0.1:{{ kibana_port }}/api/status"
    method: GET
    validate_certs: false
    status_code: 200
  register: kibana_status
  retries: 40
  delay: 15
  until: kibana_status.status == 200
  become: false

## --- FLEET TOKEN → VAULT ---

# Lire le root token Vault depuis ops-vm
- name: Slurp vault-init.json from ops-vm
  slurp:
    src: /root/vault-init.json
  become: true
  delegate_to: "{{ groups['ops'][0] }}"
  register: kibana_vault_init_raw
  no_log: true

- name: Set vault root token for Fleet
  set_fact:
    kibana_vault_root_token: "{{ (kibana_vault_init_raw.content | b64decode | from_json).root_token }}"
  no_log: true

# 200 = token déjà en Vault, 404 = absent → créer
- name: Check if Fleet enrollment token already in Vault
  uri:
    url: "https://127.0.0.1:8200/v1/secret/data/elk/fleet-enrollment-token"
    method: GET
    headers:
      X-Vault-Token: "{{ kibana_vault_root_token }}"
    ca_path: /etc/ssl/internal/ca.crt
    status_code: [200, 404]
  delegate_to: "{{ groups['ops'][0] }}"
  register: kibana_vault_fleet_check
  no_log: true

- name: Setup Fleet in Kibana
  uri:
    url: "https://127.0.0.1:{{ kibana_port }}/api/fleet/setup"
    method: POST
    url_username: elastic
    url_password: "{{ kibana_elastic_password }}"
    force_basic_auth: true
    validate_certs: false
    headers:
      kbn-xsrf: "true"
    status_code: [200, 204]
  when: kibana_vault_fleet_check.status == 404

- name: Get Fleet agent policies
  uri:
    url: "https://127.0.0.1:{{ kibana_port }}/api/fleet/agent_policies"
    method: GET
    url_username: elastic
    url_password: "{{ kibana_elastic_password }}"
    force_basic_auth: true
    validate_certs: false
    status_code: 200
  register: kibana_fleet_policies
  when: kibana_vault_fleet_check.status == 404

# Fleet setup ne crée pas toujours de politique is_default:true → en créer une si la liste est vide
- name: Create default Fleet agent policy if none exist
  uri:
    url: "https://127.0.0.1:{{ kibana_port }}/api/fleet/agent_policies"
    method: POST
    url_username: elastic
    url_password: "{{ kibana_elastic_password }}"
    force_basic_auth: true
    validate_certs: false
    headers:
      kbn-xsrf: "true"
    body_format: json
    body:
      name: "Default Policy"
      namespace: "default"
      monitoring_enabled: []
    status_code: 200
  register: kibana_fleet_policy_new
  when: kibana_vault_fleet_check.status == 404 and kibana_fleet_policies is not skipped and kibana_fleet_policies.json['items'] | length == 0

# Utiliser la politique créée, sinon prendre la première de la liste existante
- name: Set default Fleet policy ID
  set_fact:
    kibana_fleet_default_policy_id: >-
      {{ kibana_fleet_policy_new.json.item.id
         if (kibana_fleet_policy_new is defined and kibana_fleet_policy_new is not skipped)
         else (kibana_fleet_policies.json['items'] | first).id }}
  when: kibana_vault_fleet_check.status == 404 and kibana_fleet_policies is not skipped

- name: Create Fleet enrollment token
  uri:
    url: "https://127.0.0.1:{{ kibana_port }}/api/fleet/enrollment_api_keys"
    method: POST
    url_username: elastic
    url_password: "{{ kibana_elastic_password }}"
    force_basic_auth: true
    validate_certs: false
    headers:
      kbn-xsrf: "true"
    body_format: json
    body:
      name: "ansible-fleet-token"
      policy_id: "{{ kibana_fleet_default_policy_id }}"
    status_code: 200
  register: kibana_fleet_token_create
  when: kibana_vault_fleet_check.status == 404 and kibana_fleet_default_policy_id is defined
  no_log: true

# La tâche s'exécute sur ops-vm (delegate_to) → 127.0.0.1:8200 = Vault local
- name: Store Fleet enrollment token in Vault
  uri:
    url: "https://127.0.0.1:8200/v1/secret/data/elk/fleet-enrollment-token"
    method: POST
    headers:
      X-Vault-Token: "{{ kibana_vault_root_token }}"
    body_format: json
    body:
      data:
        value: "{{ kibana_fleet_token_create.json.item.api_key }}"
    ca_path: /etc/ssl/internal/ca.crt
    status_code: 200
  delegate_to: "{{ groups['ops'][0] }}"
  when: kibana_vault_fleet_check.status == 404 and kibana_fleet_default_policy_id is defined
  no_log: true
