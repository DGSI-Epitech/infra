---
teleport_version: "16"
teleport_data_dir: /var/lib/teleport
teleport_tls_dir: /etc/ssl/internal

# Adresse publique du proxy Teleport (DNAT PVE2 192.99.62.116:3080 → bastion:443)
# Les nœuds on-prem n'ont pas de route vers la DMZ (10.255.255.248/29)
teleport_proxy_server: "192.99.62.116:3080"

# Vault — join token lu depuis le même chemin que le rôle teleport
vault_addr: "https://{{ hostvars[groups['ops'][0]]['ansible_host'] }}:8200"
teleport_vault_token_path: "secret/data/teleport/join-token"

# Labels spécifiques au nœud — à surcharger dans host_vars
teleport_labels:
  site: onprem
