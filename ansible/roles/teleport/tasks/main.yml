# =============================================================================
# INSTALLATION — via repo apt officiel Teleport
# =============================================================================

- name: Add Teleport GPG key
  ansible.builtin.get_url:
    url: https://apt.releases.teleport.dev/gpg
    dest: /usr/share/keyrings/teleport-archive-keyring.asc
    mode: "0644"
  become: true

- name: Add Teleport apt repository
  apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/teleport-archive-keyring.asc]
      https://apt.releases.teleport.dev/ubuntu {{ ansible_distribution_release }}
      stable/v{{ teleport_version }}
    state: present
    filename: teleport
  become: true

- name: Install Teleport
  apt:
    name: teleport
    state: present
    update_cache: true
  become: true

# =============================================================================
# CA INTERNE — Teleport v16 valide la chaîne TLS au démarrage
# =============================================================================

- name: Add internal CA to system trust store
  copy:
    src: "{{ teleport_tls_dir }}/ca.crt"
    dest: /usr/local/share/ca-certificates/dgsi-internal-ca.crt
    remote_src: true
    mode: "0644"
  become: true
  notify: Update CA certificates

- name: Set SSL_CERT_FILE for Teleport service
  copy:
    content: "SSL_CERT_FILE={{ teleport_tls_dir }}/ca.crt\n"
    dest: /etc/default/teleport
    mode: "0644"
  become: true
  notify: Restart Teleport

# =============================================================================
# CONFIGURATION
# =============================================================================

- name: Create Teleport data directory
  file:
    path: "{{ teleport_data_dir }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  become: true

- name: Deploy Teleport config
  template:
    src: teleport.yaml.j2
    dest: /etc/teleport.yaml
    mode: "0600"
    owner: root
    group: root
  become: true
  notify: Restart Teleport

# =============================================================================
# FIREWALL — règles UFW spécifiques Teleport (443 déjà ouvert par le rôle base)
# =============================================================================

# "limit" (et non "allow") : throttle au niveau connexion (iptables recent),
# indépendant du protocole — protège 3022 sans avoir besoin de parser les
# logs d'audit Teleport (que fail2ban ne sait pas lire).
- name: Allow Teleport SSH proxy port (3022) with connection rate limiting
  community.general.ufw:
    rule: limit
    port: "{{ teleport_proxy_ssh_port | string }}"
    proto: tcp
  become: true

- name: Allow Teleport auth port from Cloud DMZ ({{ teleport_dmz_cidr }})
  community.general.ufw:
    rule: allow
    port: "{{ teleport_auth_port | string }}"
    proto: tcp
    src: "{{ teleport_dmz_cidr }}"
  become: true

- name: Allow Teleport auth port from on-prem LAN ({{ teleport_onprem_cidr }})
  community.general.ufw:
    rule: allow
    port: "{{ teleport_auth_port | string }}"
    proto: tcp
    src: "{{ teleport_onprem_cidr }}"
  become: true

# Le rôle base ouvre le 22 sans restriction de source — on le retire ici pour
# ne laisser SSH joignable que depuis les réseaux reliés par le VPN
# site-to-site (DMZ Cloud + LAN on-prem). Tout le reste est rejeté par la
# policy "default deny" déjà active (rôle base).
- name: Remove unrestricted SSH rule added by base role
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    delete: true
  become: true

- name: Allow SSH from Cloud DMZ ({{ teleport_dmz_cidr }})
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    src: "{{ teleport_dmz_cidr }}"
  become: true

- name: Allow SSH from on-prem LAN via VPN ({{ teleport_onprem_cidr }})
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    src: "{{ teleport_onprem_cidr }}"
  become: true

# =============================================================================
# SERVICE
# =============================================================================

- name: Enable and start Teleport
  systemd:
    name: teleport
    enabled: true
    state: started
  become: true

- name: Wait for Teleport auth service (3025)
  wait_for:
    port: "{{ teleport_auth_port }}"
    host: 127.0.0.1
    delay: 5
    timeout: 60

- name: Wait for Teleport proxy web service (443)
  wait_for:
    port: 443
    host: 127.0.0.1
    delay: 5
    timeout: 60
