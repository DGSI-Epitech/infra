---
- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update and upgrade apt packages
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade packages
  command: apt-get -y -o Dpkg::Options::="--force-confnew" dist-upgrade --fix-missing
  environment:
    DEBIAN_FRONTEND: noninteractive

- name: Install base packages
  apt:
    name: "{{ base_packages + ['openssh-server'] }}"
    state: present
    update_cache: true

- name: Enable SSH
  systemd:
    name: ssh
    enabled: true
    state: started

- name: Add authorized SSH key
  authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ ssh_public_key }}"
    state: present

- name: Enable qemu-guest-agent
  systemd:
    name: qemu-guest-agent
    enabled: true
    state: started

- name: Disable swap
  command: swapoff -a
  when: ansible_swaptotal_mb > 0
  changed_when: true

- name: Remove swap from fstab
  replace:
    path: /etc/fstab
    regexp: '^[^#].*\sswap\s.*$'
    replace: ''

- name: Remove swap file
  file:
    path: /swap.img
    state: absent

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker CE
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Configure Docker daemon
  copy:
    content: |
      {
        "dns": ["8.8.8.8", "1.1.1.1"],
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
    dest: /etc/docker/daemon.json
    mode: "0644"
  notify: Restart Docker

- name: Enable Docker
  systemd:
    name: docker
    enabled: true
    state: started

- name: Add ansible user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: Install UFW
  apt:
    name: ufw
    state: present

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW with default deny
  ufw:
    state: enabled
    policy: deny

- name: Allow Vault port
  ufw:
    rule: allow
    port: "8200"
    proto: tcp

- name: Clean apt cache
  apt:
    autoclean: true

- name: Vacuum systemd journal
  command: journalctl --vacuum-size=100M
  changed_when: false
