# Clé SSH publique lue depuis config.env (source unique de vérité).
ssh_public_key: "{{ lookup('pipe', playbook_dir + '/../../ansible/scripts/get_ssh_key.sh ' + playbook_dir + '/../../config.env') }}"

base_packages:
  - curl
  - wget
  - git
  - vim
  - htop
  - unzip
  - gnupg
  - apt-transport-https
  - ca-certificates
  - lsb-release
  - qemu-guest-agent
