---
## --- CONFIGURATION DOCKER & DIRECTORIES ---

- name: Configure Docker daemon DNS
  copy:
    content: |
      {
        "dns": ["8.8.8.8", "1.1.1.1"]
      }
    dest: /etc/docker/daemon.json
    mode: '0644'
  become: true
  register: vault_docker_daemon_config

- name: Restart Docker after DNS config change
  systemd:
    name: docker
    state: restarted
  become: true
  when: vault_docker_daemon_config.changed

- name: Create Vault directories
  file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
    owner: "100"
    group: "1000"
  loop:
    - { path: "{{ vault_config_dir }}", mode: '0755' }
    - { path: "{{ vault_data_dir }}", mode: '0700' }
  become: true

- name: Deploy Vault config
  template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    mode: '0644'
  become: true

## --- DEPLOYMENT & READINESS ---

# Force tous les handlers en attente (ex: Restart Docker du rôle base) à tourner
# AVANT de démarrer Vault. Sans ça, le handler Docker tourne APRÈS l'unseal
# et redémarre le container Vault → Vault repart sealed.
- name: Flush pending handlers
  meta: flush_handlers

- name: Run Vault container
  community.docker.docker_container:
    name: vault
    image: "hashicorp/vault:{{ vault_version }}"
    state: started
    recreate: true
    restart_policy: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - "{{ vault_config_dir }}:/vault/config"
      - "{{ vault_data_dir }}:/vault/data"
      - "{{ vault_tls_host_dir }}:/vault/certs:ro"
    capabilities:
      - IPC_LOCK
    env:
      VAULT_CONFIG_DIR: "/vault/config"
    command: "server"
  become: true

- name: Wait for Vault to be ready
  wait_for:
    port: 8200
    host: 127.0.0.1
    delay: 5
    timeout: 60

## --- INITIALIZATION LOGIC ---

# 1. On vérifie d'abord si le fichier de clés existe (indispensable pour la suite)
- name: Check if vault-init.json exists on server
  stat:
    path: /root/vault-init.json
  register: vault_init_file
  become: true

# 2. On vérifie le statut de Vault via l'API
- name: Check Vault init status
  uri:
    url: "https://127.0.0.1:8200/v1/sys/init"
    method: GET
    validate_certs: false
   # ca_path: "{{ vault_tls_host_dir }}/ca.crt"
  register: vault_init_status

# 2b. Capture la valeur avant que l'étape 4 (conditionnelle) puisse l'écraser
# Quand une tâche avec `register` est skippée, Ansible écrase quand même la variable
# avec {skipped: true}, ce qui efface vault_init_status.json.initialized
- name: Capture vault_initialized fact
  set_fact:
    vault_initialized: "{{ vault_init_status.json.initialized | default(false) }}"

# 3. Sécurité : Si Vault est initialisé mais qu'on n'a pas les clés, on reset tout
- name: Force reset Vault data if keys are missing
  shell: |
    docker stop vault
    rm -rf {{ vault_data_dir }}/*
    docker start vault
  become: true
  when:
    - vault_init_status.json.initialized | bool
    - not vault_init_file.stat.exists
  register: vault_reset

- name: Wait for Vault to be ready after reset
  wait_for:
    port: 8200
    delay: 5
  when: vault_reset is changed

# 4. On rafraîchit le statut APRES le reset potentiel
- name: Re-check Vault init status
  uri:
    url: "https://127.0.0.1:8200/v1/sys/init"
    method: GET
    validate_certs: false
  register: vault_init_status
  when: vault_reset is changed

# 4b. Après reset, Vault n'est plus initialisé
- name: Update vault_initialized fact after reset
  set_fact:
    vault_initialized: false
  when: vault_reset is changed

# 5. Initialisation réelle
- name: Initialize Vault
  uri:
    url: "https://127.0.0.1:8200/v1/sys/init"
    method: PUT
    body_format: json
    body:
      secret_shares: "{{ vault_init_shares }}"
      secret_threshold: "{{ vault_init_threshold }}"
    ca_path: "{{ vault_tls_host_dir }}/ca.crt"
    status_code: 200
  register: vault_init_output
  when: not (vault_initialized | bool)
  changed_when: true

- name: Save Vault init output on the server
  copy:
    content: "{{ vault_init_output.json | to_nice_json }}"
    dest: /root/vault-init.json
    owner: root
    group: root
    mode: "0600"
  when: vault_init_output is changed
  become: true

- name: Fetch vault-init.json to Ansible controller
  fetch:
    src: /root/vault-init.json
    dest: "{{ playbook_dir }}/../vault-init.json"
    flat: true
  when: vault_init_output is changed
  become: true

## --- RECOVERY & UNSEAL LOGIC ---

- name: Load existing Vault init output
  slurp:
    src: /root/vault-init.json
  register: vault_slurped_vault_init
  # On charge si le fichier existe (soit déjà là, soit créé à l'instant)
  when: vault_init_file.stat.exists or vault_init_output is changed
  become: true

- name: Set Vault keys fact
  set_fact:
    vault_keys: >-
      {{ (vault_init_output.json.keys_base64)
         if vault_init_output is changed
         else (vault_slurped_vault_init.content | b64decode | from_json).keys_base64 }}
  when:
    - vault_init_output is changed or (vault_slurped_vault_init is not skipped)
  no_log: true

- name: Check Vault seal status
  uri:
    url: "https://127.0.0.1:8200/v1/sys/seal-status"
    method: GET
    validate_certs: false
  register: vault_seal_status

- name: Unseal Vault (fresh init)
  uri:
    url: "https://127.0.0.1:8200/v1/sys/unseal"
    method: PUT
    body_format: json
    body:
      key: "{{ item }}"
    ca_path: "{{ vault_tls_host_dir }}/ca.crt"
    status_code: 200
  loop: "{{ vault_keys[:3] }}"
  when:
    - vault_keys is defined
    - vault_seal_status.json.sealed | default(false)
  no_log: true

## --- SETUP DU MOTEUR KV ---

# Capturer le root token (depuis l'init fraîche ou le fichier existant)
- name: Set vault root token
  set_fact:
    vault_root_token: >-
      {{ vault_init_output.json.root_token if (vault_init_output is changed)
         else (slurped_vault_init.content | b64decode | from_json).root_token }}
  when: vault_init_output is changed or (slurped_vault_init is defined and not (slurped_vault_init is skipped))
  no_log: true

# GET /v1/sys/mounts/secret → 200 si déjà monté, 400 si inexistant
- name: Check if KV secrets engine is mounted
  uri:
    url: "https://127.0.0.1:8200/v1/sys/mounts/secret"
    method: GET
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    ca_path: "{{ vault_tls_host_dir }}/ca.crt"
    status_code: [200, 400]
  register: vault_kv_mount_check
  when: vault_root_token is defined
  no_log: true

- name: Enable KV v2 secrets engine at secret/
  uri:
    url: "https://127.0.0.1:8200/v1/sys/mounts/secret"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      type: "kv"
      options:
        version: "2"
    ca_path: "{{ vault_tls_host_dir }}/ca.crt"
    status_code: 204
  when: vault_root_token is defined and vault_kv_mount_check is not skipped and vault_kv_mount_check.status != 200
