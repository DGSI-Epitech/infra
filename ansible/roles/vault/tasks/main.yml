- name: Create Vault directories
  file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ vault_config_dir }}", mode: '0755' }
    - { path: "{{ vault_data_dir }}",   mode: '0755' }
  become: true

- name: Deploy Vault config
  template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    mode: '0644'
  become: true

- name: Run Vault container
  community.docker.docker_container:
    name: vault
    image: "hashicorp/vault:{{ vault_version }}"
    state: started
    restart_policy: unless-stopped
    network_mode: host
    volumes:
      - "{{ vault_config_dir }}:/vault/config"
      - "{{ vault_data_dir }}:/vault/data"
    capabilities:
      - IPC_LOCK
    command: server -config=/vault/config/vault.hcl
  become: true

- name: Wait for Vault to be ready
  wait_for:
    port: 8200
    host: 127.0.0.1
    delay: 5
    timeout: 30

- name: Check Vault init status
  uri:
    url: "http://127.0.0.1:8200/v1/sys/init"
    method: GET
  register: vault_init_status
  retries: 10
  delay: 3
  until: vault_init_status.status == 200

- name: Initialize Vault
  uri:
    url: "http://127.0.0.1:8200/v1/sys/init"
    method: PUT
    body_format: json
    body:
      secret_shares: "{{ vault_init_shares }}"
      secret_threshold: "{{ vault_init_threshold }}"
  register: vault_init_result
  when: not vault_init_status.json.initialized

- name: Save init output to /root/vault-init.json
  copy:
    content: "{{ vault_init_result.json | to_nice_json }}"
    dest: /root/vault-init.json
    mode: '0600'
  when: not vault_init_status.json.initialized

- name: Unseal Vault
  uri:
    url: "http://127.0.0.1:8200/v1/sys/unseal"
    method: PUT
    body_format: json
    body:
      key: "{{ item }}"
  loop: "{{ vault_init_result.json.keys_base64[:vault_init_threshold] }}"
  when: not vault_init_status.json.initialized
