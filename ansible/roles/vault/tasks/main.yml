---
- name: Install dependencies
  apt:
    name:
      - unzip
      - curl
    state: present
    update_cache: yes
  become: true

- name: Create vault group
  group:
    name: "{{ vault_group }}"
    system: true
    state: present
  become: true

- name: Create vault user
  user:
    name: "{{ vault_user }}"
    group: "{{ vault_group }}"
    system: true
    shell: /bin/false
    create_home: false
    state: present
  become: true

- name: Create vault directories
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ vault_config_dir }}", mode: "0755" }
    - { path: "{{ vault_data_dir }}",   mode: "0700" }
  become: true


- name: Download Vault
  get_url:
    url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
    dest: "/tmp/vault.zip"
  become: true

- name: Unzip Vault
  unarchive:
    src: "/tmp/vault.zip"
    dest: "/tmp/"
    remote_src: true
  become: true

- name: Install Vault binary
  copy:
    src: "/tmp/vault"
    dest: "{{ vault_install_dir }}/vault"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  become: true
  notify: restart vault

- name: Deploy Vault config
  template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: "0640"
  become: true
  notify: restart vault

- name: Deploy Vault systemd service
  template:
    src: vault.service.j2
    dest: /etc/systemd/system/vault.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: restart vault

- name: Enable and start Vault
  systemd:
    name: vault
    enabled: true
    state: started
    daemon_reload: true
  become: true