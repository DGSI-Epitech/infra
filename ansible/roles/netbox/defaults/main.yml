netbox_version: v4.1.6
netbox_dir: /opt/netbox
netbox_port: 8080
netbox_superuser: admin
netbox_superuser_email: admin@netbox.local
# Ancien: VM_IP_SERVICES: 172.16.0.241/28  ← variable config.env copiée dans les defaults (incorrect)
# Ces variables lisent config.env via lookup ou l'inventaire dynamique
netbox_vm_lan_subnet: "{{ lookup('env', 'VM_LAN_SUBNET') | default('172.16.0.240/28', true) }}"
netbox_vm_ip_services: "{{ lookup('env', 'VM_IP_SERVICES') | default(ansible_host + '/28', true) }}"
netbox_remote_url: "http://{{ ansible_host }}:{{ netbox_port }}"

netbox_password: ""
netbox_api_token: ""
netbox_secret_key: ""
