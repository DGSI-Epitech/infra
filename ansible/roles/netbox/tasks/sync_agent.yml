- name: Déployer script auto-sync NetBox
  template:
    src: netbox-sync.sh.j2
    dest: /usr/local/bin/netbox-sync.sh
    mode: '0755'

- name: Lancer sync initial
  command: /usr/local/bin/netbox-sync.sh
  register: netbox_sync_result

- name: Afficher résultat sync
  debug:
    var: netbox_sync_result.stdout_lines

- name: Planifier auto-sync NetBox toutes les heures
  cron:
    name: netbox-auto-sync
    minute: "0"
    hour: "*"
    job: /usr/local/bin/netbox-sync.sh >> /var/log/netbox-sync.log 2>&1
