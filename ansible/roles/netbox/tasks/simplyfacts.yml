- name: Créer script auto-sync NetBox
  copy:
    dest: /usr/local/bin/netbox-sync.sh
    mode: '0755'
    content: |
      #!/bin/bash
      NETBOX_URL="http://localhost:{{ netbox_port }}"
      NETBOX_TOKEN="{{ netbox_api_token }}"
      HOSTNAME=$(hostname)
      VCPUS=$(nproc)
      MEMORY=$(free -m | awk '/^Mem:/{print $2}')

      VM_ID=$(curl -sf -H "Authorization: Token $NETBOX_TOKEN" \
        "$NETBOX_URL/api/virtualization/virtual-machines/?name=$HOSTNAME" | \
        python3 -c "import sys,json; d=json.load(sys.stdin); print(d['results'][0]['id'] if d['count']>0 else '')" 2>/dev/null)

      if [ -n "$VM_ID" ]; then
        curl -sf -X PATCH -H "Authorization: Token $NETBOX_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"vcpus\": $VCPUS, \"memory\": $MEMORY, \"status\": \"active\"}" \
          "$NETBOX_URL/api/virtualization/virtual-machines/$VM_ID/" > /dev/null
        echo "$(date) updated $HOSTNAME (id=$VM_ID) vcpus=$VCPUS mem=${MEMORY}MB"
      else
        curl -sf -X POST -H "Authorization: Token $NETBOX_TOKEN" \
          -H "Content-Type: application/json" \
          -d "{\"name\": \"$HOSTNAME\", \"cluster\": {\"name\": \"On-Prem Proxmox\"}, \"status\": \"active\", \"vcpus\": $VCPUS, \"memory\": $MEMORY}" \
          "$NETBOX_URL/api/virtualization/virtual-machines/" > /dev/null
        echo "$(date) created $HOSTNAME vcpus=$VCPUS mem=${MEMORY}MB"
      fi

- name: Lancer sync initial
  command: /usr/local/bin/netbox-sync.sh
  register: sync_result

- name: Afficher résultat sync
  debug:
    var: sync_result.stdout_lines

- name: Planifier auto-sync NetBox toutes les heures
  cron:
    name: netbox-auto-sync
    minute: "0"
    hour: "*"
    job: /usr/local/bin/netbox-sync.sh >> /var/log/netbox-sync.log 2>&1
