---
## --- SECRETS DEPUIS VAULT (si déjà stockés par un run précédent) ---

- name: Slurp vault-init.json (vault root token)
  slurp:
    src: /root/vault-init.json
  become: true
  register: elk_vault_init_raw
  no_log: true

- name: Set vault root token
  set_fact:
    elk_vault_root_token: "{{ (elk_vault_init_raw.content | b64decode | from_json).root_token }}"
  no_log: true

# 200 = mot de passe déjà en Vault (run précédent), 404 = absent → on garde le default puis on le stockera
- name: Check if elastic password already in Vault
  uri:
    url: "https://127.0.0.1:8200/v1/secret/data/elk/elastic-password"
    method: GET
    headers:
      X-Vault-Token: "{{ elk_vault_root_token }}"
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    status_code: [200, 404]
  register: elk_vault_elastic_check
  no_log: true

- name: Use elastic password from Vault
  set_fact:
    elk_elastic_password: "{{ elk_vault_elastic_check.json.data.data.value }}"
  when: elk_vault_elastic_check.status == 200
  no_log: true

- name: Check if kibana_system password already in Vault
  uri:
    url: "https://127.0.0.1:8200/v1/secret/data/elk/kibana-system-password"
    method: GET
    headers:
      X-Vault-Token: "{{ elk_vault_root_token }}"
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    status_code: [200, 404]
  register: elk_vault_kibana_system_check
  no_log: true

- name: Use kibana_system password from Vault
  set_fact:
    elk_kibana_system_password: "{{ elk_vault_kibana_system_check.json.data.data.value }}"
  when: elk_vault_kibana_system_check.status == 200
  no_log: true

- name: Set vm.max_map_count for Elasticsearch
  ansible.posix.sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: true

- name: Create ELK directories
  file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ elk_dir }}", mode: "0755" }
    - { path: "{{ elk_dir }}/elasticsearch/config", mode: "0755" }
    - { path: "{{ elk_dir }}/elasticsearch/data", mode: "0755" }

- name: Set Elasticsearch data directory ownership
  file:
    path: "{{ elk_dir }}/elasticsearch/data"
    state: directory
    owner: "1000"
    group: "1000"

- name: Deploy Elasticsearch config
  template:
    src: elasticsearch.yml.j2
    dest: "{{ elk_dir }}/elasticsearch/config/elasticsearch.yml"
    mode: "0644"

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ elk_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start Elasticsearch
  command: docker compose up -d elasticsearch
  args:
    chdir: "{{ elk_dir }}"
  changed_when: false

- name: Wait for Elasticsearch to be ready
  uri:
    url: "https://127.0.0.1:{{ elk_es_port }}/_cluster/health"
    method: GET
    url_username: elastic
    url_password: "{{ elk_elastic_password }}"
    force_basic_auth: true
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    status_code: 200
  register: elk_es_health
  retries: 20
  delay: 10
  until: elk_es_health.status == 200

- name: Set kibana_system password in Elasticsearch
  uri:
    url: "https://127.0.0.1:{{ elk_es_port }}/_security/user/kibana_system/_password"
    method: POST
    url_username: elastic
    url_password: "{{ elk_elastic_password }}"
    force_basic_auth: true
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    body_format: json
    body:
      password: "{{ elk_kibana_system_password }}"
    status_code: 200
  register: elk_kibana_pw
  retries: 10
  delay: 15
  until: elk_kibana_pw.status == 200
  no_log: true

## --- SECRETS → VAULT (premier run uniquement) ---

- name: Store elastic password in Vault
  uri:
    url: "https://127.0.0.1:8200/v1/secret/data/elk/elastic-password"
    method: POST
    headers:
      X-Vault-Token: "{{ elk_vault_root_token }}"
    body_format: json
    body:
      data:
        value: "{{ elk_elastic_password }}"
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    status_code: 200
  when: elk_vault_elastic_check.status == 404
  no_log: true

- name: Store kibana_system password in Vault
  uri:
    url: "https://127.0.0.1:8200/v1/secret/data/elk/kibana-system-password"
    method: POST
    headers:
      X-Vault-Token: "{{ elk_vault_root_token }}"
    body_format: json
    body:
      data:
        value: "{{ elk_kibana_system_password }}"
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    status_code: 200
  when: elk_vault_kibana_system_check.status == 404
  no_log: true

- name: Create Filebeat ILM policy
  uri:
    url: "https://127.0.0.1:{{ elk_es_port }}/_ilm/policy/filebeat-policy"
    method: PUT
    url_username: elastic
    url_password: "{{ elk_elastic_password }}"
    force_basic_auth: true
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    body_format: json
    body:
      policy:
        phases:
          hot:
            min_age: "0ms"
            actions:
              rollover:
                max_size: "1gb"
                max_age: "7d"
          delete:
            min_age: "30d"
            actions:
              delete: {}
    status_code: 200

- name: Allow Elasticsearch API
  community.general.ufw:
    rule: allow
    port: "{{ elk_es_port | string }}"
    proto: tcp

- name: Allow Elasticsearch cluster
  community.general.ufw:
    rule: allow
    port: "{{ elk_es_cluster_port | string }}"
    proto: tcp
