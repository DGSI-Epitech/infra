---
- name: Set vm.max_map_count for Elasticsearch
  sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: true

- name: Create ELK directories
  file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ elk_dir }}",                          mode: "0755" }
    - { path: "{{ elk_dir }}/elasticsearch/config",     mode: "0755" }
    - { path: "{{ elk_dir }}/elasticsearch/data",       mode: "0755" }
    - { path: "{{ elk_dir }}/logstash/config",          mode: "0755" }
    - { path: "{{ elk_dir }}/logstash/pipeline",        mode: "0755" }
    - { path: "{{ elk_dir }}/kibana/config",            mode: "0755" }

- name: Set Elasticsearch data directory ownership
  file:
    path: "{{ elk_dir }}/elasticsearch/data"
    state: directory
    owner: "1000"
    group: "1000"

- name: Deploy Elasticsearch config
  template:
    src: elasticsearch.yml.j2
    dest: "{{ elk_dir }}/elasticsearch/config/elasticsearch.yml"
    mode: "0644"
  notify: restart elk

- name: Deploy Logstash config
  template:
    src: logstash.yml.j2
    dest: "{{ elk_dir }}/logstash/config/logstash.yml"
    mode: "0644"
  notify: restart elk

- name: Deploy Logstash pipeline
  template:
    src: pipeline.conf.j2
    dest: "{{ elk_dir }}/logstash/pipeline/main.conf"
    mode: "0644"
  notify: restart elk

- name: Deploy Kibana config
  template:
    src: kibana.yml.j2
    dest: "{{ elk_dir }}/kibana/config/kibana.yml"
    mode: "0644"
  notify: restart elk

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ elk_dir }}/docker-compose.yml"
    mode: "0644"
  notify: restart elk

- name: Start ELK stack
  command: docker compose up -d
  args:
    chdir: "{{ elk_dir }}"
  register: compose_up
  changed_when: >
    'Started' in compose_up.stdout or
    'Created' in compose_up.stdout or
    'Recreated' in compose_up.stdout

- name: Wait for Elasticsearch to be ready
  uri:
    url: "http://127.0.0.1:{{ elk_es_port }}/_cluster/health"
    method: GET
    status_code: 200
  register: es_health
  retries: 20
  delay: 10
  until: es_health.status == 200

- name: Allow Elasticsearch API
  ufw:
    rule: allow
    port: "{{ elk_es_port | string }}"
    proto: tcp

- name: Allow Elasticsearch cluster
  ufw:
    rule: allow
    port: "{{ elk_es_cluster_port | string }}"
    proto: tcp

- name: Allow Kibana
  ufw:
    rule: allow
    port: "{{ elk_kibana_port | string }}"
    proto: tcp

- name: Allow Logstash Beats input
  ufw:
    rule: allow
    port: "{{ elk_logstash_beats_port | string }}"
    proto: tcp

# --- Fleet Server ---

- name: Wait for Kibana to be ready
  uri:
    url: "http://127.0.0.1:{{ elk_kibana_port }}/api/status"
    method: GET
    status_code: 200
  register: kibana_status
  retries: 30
  delay: 10
  until: kibana_status.status == 200

- name: Wait for Fleet Server API to be ready
  uri:
    url: "http://127.0.0.1:{{ elk_fleet_port }}/api/status"
    method: GET
    status_code: 200
  register: fleet_status
  retries: 30
  delay: 10
  until: fleet_status.status == 200

- name: Trigger Kibana Fleet initialization
  uri:
    url: "http://127.0.0.1:{{ elk_kibana_port }}/api/fleet/setup"
    method: POST
    headers:
      kbn-xsrf: "true"
    status_code: [200, 201]
  register: fleet_setup
  retries: 30
  delay: 10
  until: fleet_setup.status in [200, 201]

- name: Get Fleet enrollment token from Kibana
  uri:
    url: "http://127.0.0.1:{{ elk_kibana_port }}/api/fleet/enrollment_api_keys"
    method: GET
    headers:
      kbn-xsrf: "true"
    status_code: 200
  register: fleet_keys
  retries: 10
  delay: 10
  until: fleet_keys.status == 200 and (fleet_keys.json.items | default([]) | length) > 0

- name: Set fleet enrollment token fact
  set_fact:
    fleet_enrollment_token: "{{ fleet_keys.json.items[0].api_key }}"
  no_log: true

# --- Écriture du token dans Vault ---

- name: Read vault-init.json
  slurp:
    src: /root/vault-init.json
  become: true
  register: vault_init_raw

- name: Set vault root token
  set_fact:
    vault_root_token: "{{ (vault_init_raw.content | b64decode | from_json).root_token }}"
  no_log: true

- name: Enable KV secrets engine in Vault (idempotent)
  uri:
    url: "http://127.0.0.1:8200/v1/sys/mounts/secret"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      type: kv
      options:
        version: "2"
    status_code: [200, 204, 400]

- name: Store Fleet enrollment token in Vault
  uri:
    url: "http://127.0.0.1:8200/v1/secret/data/elk/fleet-enrollment-token"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      data:
        value: "{{ fleet_enrollment_token }}"
    status_code: [200, 204]
  no_log: true

- name: Allow Fleet Server port
  ufw:
    rule: allow
    port: "{{ elk_fleet_port | string }}"
    proto: tcp
