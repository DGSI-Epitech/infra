---
- name: Set vm.max_map_count for Elasticsearch
  sysctl:
    name: vm.max_map_count
    value: "262144"
    state: present
    reload: true

- name: Create ELK directories
  file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ elk_dir }}",                          mode: "0755" }
    - { path: "{{ elk_dir }}/elasticsearch/config",     mode: "0755" }
    - { path: "{{ elk_dir }}/elasticsearch/data",       mode: "0755" }
    - { path: "{{ elk_dir }}/kibana/config",            mode: "0755" }

- name: Set Elasticsearch data directory ownership
  file:
    path: "{{ elk_dir }}/elasticsearch/data"
    state: directory
    owner: "1000"
    group: "1000"

- name: Deploy Elasticsearch config
  template:
    src: elasticsearch.yml.j2
    dest: "{{ elk_dir }}/elasticsearch/config/elasticsearch.yml"
    mode: "0644"

- name: Deploy Kibana config
  template:
    src: kibana.yml.j2
    dest: "{{ elk_dir }}/kibana/config/kibana.yml"
    mode: "0644"

- name: Deploy docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ elk_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start Elasticsearch
  command: docker compose up -d elasticsearch
  args:
    chdir: "{{ elk_dir }}"
  changed_when: false

- name: Wait for Elasticsearch to be ready
  uri:
    url: "https://127.0.0.1:{{ elk_es_port }}/_cluster/health"
    method: GET
    url_username: elastic
    url_password: "{{ elk_elastic_password }}"
    force_basic_auth: true
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    status_code: 200
  register: es_health
  retries: 20
  delay: 10
  until: es_health.status == 200

- name: Set kibana_system password in Elasticsearch
  uri:
    url: "https://127.0.0.1:{{ elk_es_port }}/_security/user/kibana_system/_password"
    method: POST
    url_username: elastic
    url_password: "{{ elk_elastic_password }}"
    force_basic_auth: true
    ca_path: "{{ elk_tls_host_dir }}/ca.crt"
    body_format: json
    body:
      password: "{{ elk_kibana_system_password }}"
    status_code: 200
  register: kibana_pw
  retries: 10
  delay: 15
  until: kibana_pw.status == 200
  no_log: true

- name: Allow Elasticsearch API
  ufw:
    rule: allow
    port: "{{ elk_es_port | string }}"
    proto: tcp

- name: Allow Elasticsearch cluster
  ufw:
    rule: allow
    port: "{{ elk_es_cluster_port | string }}"
    proto: tcp

